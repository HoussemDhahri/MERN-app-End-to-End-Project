apiVersion: v1
kind: Service

metadata:
  name: todolist-database-service
  labels:
    app: todolist
    component: database

spec:
  selector:
    app: todolist
    component: database

  ports:
    - name: mongodb
      protocol: TCP
      port: 27017
      targetPort: 27017
      
    - name: metrics
      protocol: TCP
      port: 9216
      targetPort: 9216

  type: ClusterIP