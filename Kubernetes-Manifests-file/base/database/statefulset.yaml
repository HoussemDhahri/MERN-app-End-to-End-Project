apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: todolist-database
  labels:
    app: todolist
    component: database
spec:
  serviceName: todolist-database
  replicas: 1
  selector:
    matchLabels:
      app: todolist
      component: database
  template:
    metadata:
      labels:
        app: todolist
        component: database
    spec:
      containers:
        - name: mongodb
          image: mongo:4.4
          
          ports:
            - containerPort: 27017

          env:
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mongodb-config
                  key: MONGO_INITDB_DATABASE

            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_INITDB_ROOT_USERNAME

            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_INITDB_ROOT_PASSWORD

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db

  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi