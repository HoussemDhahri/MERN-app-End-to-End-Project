apiVersion: apps/v1
kind: Deployment
metadata:
  name: todolist-backend-deployment
  labels:
    app: todolist
    component: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: todolist
      component: backend

  template:
    metadata:
      labels:
        app: todolist
        component: backend

    spec:
      containers:
        - name: todolist-backend
          image: houssemdhahri93/todolist-backend
          imagePullPolicy: Always

          ports:
            - containerPort: 3500

          env:
            - name: PORT
              value: "3500"

            - name: MONGO_CONN_STR
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_CONN_STR

          livenessProbe:
            httpGet:
              path: /healthz
              port: 3500
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 3500
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "384Mi"