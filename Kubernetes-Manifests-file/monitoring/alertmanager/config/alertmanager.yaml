global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  routes:
    - matchers:
        - severity = critical
      receiver: telegram
      repeat_interval: 30m
    - matchers:
        - severity = warning
      receiver: telegram
      repeat_interval: 2h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram-token/bot_token
        chat_id: -1003954919587
        send_resolved: true
        parse_mode: HTML
        message: '{{ template "telegram.message" . }}'

templates:
  - /etc/alertmanager/config/*.tmpl