apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: todolist-database-sm
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - todolist-staging
      - todolist-prod
  selector:
    matchLabels:
      app: todolist
      component: database
  endpoints:
    - port: "9216"
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s