apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: database-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: database
      rules:
        - alert: MongoDBDown
          expr: up{container="mongodb"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "MongoDB is down"
            description: "MongoDB pod is not running"

        - alert: MongoDBHighConnections
          expr: mongodb_connections{state="current"} > 100
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "MongoDB high connections"
            description: "MongoDB has {{ $value }} active connections"