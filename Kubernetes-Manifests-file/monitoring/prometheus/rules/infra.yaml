apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: infra-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: infra
      rules:
        - alert: NodeMemoryHigh
          expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.85
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Memory high on {{ $labels.instance }}"
            description: "Memory usage is above 85%"

        - alert: NodeCPUHigh
          expr: rate(node_cpu_seconds_total{mode!="idle"}[5m]) > 0.85
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "CPU high on {{ $labels.instance }}"
            description: "CPU usage is above 85%"

        - alert: NodeDiskHigh
          expr: (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes > 0.85
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Disk high on {{ $labels.instance }}"
            description: "Disk usage is above 85% on {{ $labels.mountpoint }}"