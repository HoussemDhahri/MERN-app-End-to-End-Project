apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todolist-prod-ingress

spec:
  ingressClassName: nginx

  rules:
    - host: todolist.local

      http:
        paths:
        
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todolist-frontend-service
                port:
                  number: 3000


          - path: /api
            pathType: Prefix
            backend:
              service:
                name: todolist-backend-service
                port:
                  number: 3500