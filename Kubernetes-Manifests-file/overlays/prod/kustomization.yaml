apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base/frontend
- ../../base/backend
- ../../base/database

namespace: todolist-prod




patches:
- path: ingress-patch.yaml
  target:
    kind: Ingress
    name: frontend-ingress
- path: configmap-patch.yaml
  target:
    kind: ConfigMap
    name: todolist-frontend-config
- path: hpa-backend-patch.yaml
  target:
    kind: HorizontalPodAutoscaler
    name: todolist-backend-hpa
- path: hpa-frontend-patch.yaml
  target:
    kind: HorizontalPodAutoscaler
    name: todolist-frontend-hpa



images:
- name: houssemdhahri93/todolist-backend
  newName: houssemdhahri93/todolist-backend
  newTag: v1.0.2
- name: houssemdhahri93/todolist-frontend
  newName: houssemdhahri93/todolist-frontend
  newTag: v1.0.2
