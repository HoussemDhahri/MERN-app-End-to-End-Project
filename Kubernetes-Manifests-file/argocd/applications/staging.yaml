apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todolist-staging
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/HoussemDhahri/MERN-Stack-Devsecops-End-to-End-Project.git
    targetRevision: main
    path: Kubernetes-Manifests-file/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: todolist-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true