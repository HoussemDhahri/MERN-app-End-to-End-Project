apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todolist-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/HoussemDhahri/MERN-Stack-Devsecops-End-to-End-Project.git
    targetRevision: main
    path: Kubernetes-Manifests-file/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: todolist-prod

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true